name: samchat_flutter
description: "SamChat — a modern WhatsApp-style chat app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local plugin package (not published) bridging to native Android Telecom
  # (self-managed ConnectionService) for real incoming-call ringing/answer —
  # see packages/samchat_telecom/pubspec.yaml for why this has to be a real
  # Flutter plugin rather than a MainActivity-only channel.
  samchat_telecom:
    path: packages/samchat_telecom

  # Networking / auth
  dio: ^5.7.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.4

  # Realtime (Pusher Channels wire protocol) — hand-rolled client, see
  # lib/core/realtime/pusher_protocol_client.dart. Originally needed because
  # pusher_channels_flutter's public API had no way to target the
  # self-hosted Reverb server this backend used to run (Android has no host
  # override at all; iOS's Dart init() never forwards host/port keys). The
  # backend now uses real Pusher Channels instead of self-hosted Reverb, so
  # that constraint no longer strictly applies, but the hand-rolled client
  # also owns retry/backoff, resubscribe-on-reconnect, and socket-dedup
  # logic (see pusher_protocol_client.dart) that's easier to keep than to
  # re-verify against the plugin — no reason to swap it out.
  web_socket_channel: ^3.0.1

  # WebRTC calls
  flutter_webrtc: ^1.5.2

  # Navigation / state
  go_router: ^15.1.2
  flutter_riverpod: ^2.6.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  video_player: ^2.9.2
  record: ^6.0.0
  just_audio: ^0.9.42

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Push notifications
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Webview (Sampay OAuth)
  webview_flutter: ^4.10.0

  # Encrypted chat backup (Android → Google Drive appDataFolder; see
  # lib/core/crypto/backup/). Only used for the OAuth handshake — the
  # actual Drive v3 REST calls are hand-rolled with dio (see
  # android_drive_backup_provider.dart) rather than pulling in the full
  # googleapis package, matching this project's existing preference for
  # lightweight hand-rolled clients over heavy SDKs.
  google_sign_in: ^7.2.0

  # UI polish
  cached_network_image: ^3.4.1
  flutter_slidable: ^3.1.2
  skeletonizer: ^2.1.3
  # Lets the chat detail screen jump-to-index reliably even when the target
  # message isn't currently built by the lazy list (tap-a-reply-to-scroll-
  # to-original, WhatsApp-style) — a plain ListView/ScrollController can't
  # do this for items outside the loaded viewport without an unreliable
  # manual offset estimate.
  scrollable_positioned_list: ^0.3.8
  emoji_picker_flutter: ^3.1.0
  intl: ^0.19.0
  intl_phone_field: ^3.2.0
  photo_view: ^0.15.0

  # Utils
  connectivity_plus: ^6.1.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  # Local chat/message cache for offline viewing (lib/core/cache/) — already
  # pulled in transitively via cached_network_image -> flutter_cache_manager,
  # promoted to a direct dependency here since we now import it ourselves.
  sqflite: ^2.4.2
  permission_handler: ^11.3.1
  equatable: ^2.0.7
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  cryptography: ^2.7.0
  local_auth: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  # Runs sqflite against a real (desktop/in-memory) SQLite engine in plain
  # `flutter test`, instead of needing a device/emulator's platform channel
  # — used only by test/chat_cache_service_test.dart.
  sqflite_common_ffi: ^2.4.0+3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/samchat_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/samchat_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 700
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 800
